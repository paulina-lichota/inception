services:
  mariadb:
    build: ./srcs/requirements/mariadb
    restart: always
    env_file: ./srcs/.env
    secrets:
      - db_password
      - db_root_password   # password del root di mariadb, usato solo in init.sh
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    build: ./srcs/requirements/wordpress
    restart: always
    env_file: ./srcs/.env
    secrets:
      - db_password        # password dell'utente generico di mariadb, wordpress la usa per connettersi al db
      - wp_admin_password  # password dell'admin WordPress, usato in setup.sh
      - wp_user_password   # password dell'utente aggiuntivo, usato in setup.sh
    depends_on:
        mariadb:
          condition: service_healthy
    volumes:
      - wp_data:/var/www/html   # no db_data perchè ci parla tramite Mysql (i dati lì sono in binario, solo mysql ci può parlare)
    networks:
      - inception

  nginx:
    build: ./srcs/requirements/nginx
    restart: always
    env_file: ./srcs/.env
    depends_on:
      wordpress:
        condition: service_started
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/plichota/data/db
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/plichota/data/wordpress

# Docker crea network di default da solo, ma da subject devo mettere questo
# "The network line must be present in your docker-compose.yml file"
networks:
  inception:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt
  wp_admin_password:
    file: ./secrets/wp_admin_password.txt
  wp_user_password:
    file: ./secrets/wp_user_password.txt